<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breathing Meditation App</title>
    <link rel="stylesheet" href="styles.css">
    <meta name="description" content="A breathing meditation app with animated orb and health data integration">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1>Breathing Meditation</h1>
            <div class="health-metrics">
                <div class="metric">
                    <span class="metric-label">Heart Rate</span>
                    <span class="metric-value" id="heart-rate">--</span>
                    <span class="metric-unit">bpm</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Stress Level</span>
                    <span class="metric-value" id="stress-level">--</span>
                    <span class="metric-unit">%</span>
                </div>
                <div class="metric">
                    <span class="metric-label">Breath Rate</span>
                    <span class="metric-value" id="breath-rate">--</span>
                    <span class="metric-unit">bpm</span>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div class="breathing-container">
                <div class="breathing-orb" id="breathing-orb">
                    <div class="orb-inner"></div>
                    <div class="pulse-ring"></div>
                    <div class="pulse-ring delayed"></div>
                </div>
                
                <div class="breathing-instructions">
                    <div class="instruction-text" id="instruction-text">Tap to begin</div>
                    <div class="breath-counter">
                        <span id="breath-count">0</span> breaths
                    </div>
                </div>
            </div>

            <div class="controls">
                <button class="control-btn primary" id="start-btn">Start Session</button>
                <button class="control-btn secondary" id="pause-btn" disabled>Pause</button>
                <button class="control-btn secondary" id="reset-btn">Reset</button>
                <button class="control-btn secondary" id="connect-device-btn">Connect Device</button>
            </div>

            <div class="session-settings">
                <div class="setting">
                    <label for="session-duration">Session Duration (minutes):</label>
                    <select id="session-duration">
                        <option value="1">1</option>
                        <option value="3">3</option>
                        <option value="5" selected>5</option>
                        <option value="10">10</option>
                        <option value="15">15</option>
                    </select>
                </div>
                <div class="setting">
                    <label for="breathing-pattern">Breathing Pattern:</label>
                    <select id="breathing-pattern">
                        <option value="4-4-4-4" selected>4-4-4-4 (Box Breathing)</option>
                        <option value="4-7-8">4-7-8 (Relaxing)</option>
                        <option value="6-2-6-2">6-2-6-2 (Energizing)</option>
                    </select>
                </div>
            </div>
        </main>

        <footer class="connection-status">
            <div class="status-indicator" id="connection-status">
                <span class="status-dot"></span>
                <span class="status-text">No device connected</span>
            </div>
        </footer>
    </div>

    <script src="js/breathing-engine.js"></script>
    <script src="js/health-monitor.js"></script>
    <script src="js/wearable-connector.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
